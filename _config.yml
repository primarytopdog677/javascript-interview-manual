title: ""
description: "The ultimate production-grade crunch-time revision framework engineered for Senior SDE loops."

# 🎨 Premium Remote Layout: just-the-docs
remote_theme: just-the-docs/just-the-docs

# 🌐 Core Repository and Domain Overrides
repository: Priyammondal/javascript-interview-manual
url: "https://priyammondal.github.io"
baseurl: "/javascript-interview-manual"

# 🎛️ Layout & Feature Disables (Keeps it clean and centered)
nav_enabled: false
search_enabled: false
heading_anchors: true

# 🛠️ Correct Syntax Highlighting Configuration
# Note: Just the Docs natively handles Rouge. To disable line numbers cleanly, 
# set this to false. "wrap" and "css_class" variables are managed automatically by the theme core.
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# 👨‍💻 Author Profile Meta Configuration
author:
  name: "Priyam Mondal"
  email: "priyammondal096@gmail.com"
  github: "Priyammondal"

# 🖼️ Open Graph Visual Branding Assets
og_image: "assets/banner.png"

# ⚙️ Jekyll Building Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/