---
layout: default
---

<style>
    /* 1. Clear the theme-header block spacing */
    #main-header {
        display: none !important;
    }

    /* 2. Sleek UI Theme-Matched Floating Button */
    #scroll-to-top-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        width: 44px;
        height: 44px;

        /* Native color palette matching the Just the Docs dark theme elements */
        background-color: rgba(30, 34, 43, 0.75);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        /* Smooth rounded squircle layout, matches theme components */

        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);

        /* Starts hidden and downscaled */
        opacity: 0;
        pointer-events: none;
        transform: scale(0.8) translateY(10px);
    }

    /* Smooth SVG layout styling */
    #scroll-to-top-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: #ffffff;
        /* Crisp white icon */
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.2s ease;
    }

    /* Interactive Hover Effect */
    #scroll-to-top-btn:hover {
        background-color: rgba(40, 46, 58, 0.9);
        border-color: rgba(255, 255, 255, 0.25);
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
    }

    #scroll-to-top-btn:hover svg {
        transform: translateY(-2px);
        /* Micro-interaction nudges arrow up slightly */
    }

    /* Visible state trigger */
    #scroll-to-top-btn.visible {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1) translateY(0);
    }
</style>

<button id="scroll-to-top-btn" aria-label="Scroll to top" title="Go to top">
    <svg viewBox="0 0 24 24">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
</button>

{{ content }}

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const topBtn = document.getElementById('scroll-to-top-btn');

        window.addEventListener('scroll', function () {
            if (window.scrollY > 400) {
                topBtn.classList.add('visible');
            } else {
                topBtn.classList.remove('visible');
            }
        });

        topBtn.addEventListener('click', function () {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    });
</script>
